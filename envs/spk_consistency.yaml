# spk_consistency — speaker verification, consistency, and clustering plots
#
# Powers axes 4, 5, and 8:
#   speaker caption verification, speaker consistency, speaker cluster plots
#
# Create:
#   conda env create -f envs/spk_consistency.yaml
#   conda activate spk_consistency
#
# Uses intfloat/e5-base-v2 for text embeddings (downloaded on first run).
# GPU recommended but CPU works for small runs.

name: spk_consistency
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch>=2.1.0
      - transformers>=4.40.0
      - scikit-learn>=1.3.0
      - scipy>=1.11.0
      - matplotlib>=3.8.0
      - numpy>=1.24.0
      - tqdm>=4.66.0
      - huggingface_hub>=0.23.0
